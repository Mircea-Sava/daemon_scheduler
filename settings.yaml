settings:
  retry_delay_seconds: 60          # initial delay after first failure
  retry_max_delay_seconds: 1800    # cap backoff at 30 min (60, 120, 240, 480, 960, 1800, 1800, ...)
  
  use_workers: 1                   # 0 = sequential, 1 = parallel (auto-profile via psutil)
  max_workers: 80                  # 80 = reserve 80% capacity for scripts, 20% for OS
  default_worker_cost: 80          # Default cost for new/unprofiled scripts
  
  log_task_output: true            # true = capture and log script, false = discard
  log_keep_count: 14               # keep this many daily log files, delete oldest beyond this
  
  git_pull_interval_minutes: 10    # 0 = disabled. Smart pull: only pulls when remote has new commits.
  # Push is event-driven: pushes automatically after each task completes. Also supports on-demand push via monitor (u key).
  
  failure_email:
    enabled: False
    to: ""
    cc: ""
    subject: "Sequencer Task Failed: {task_name}"
    body: |
      Task '{task_name}' failed. It will keep retrying automatically.

      Time: {timestamp}
      Script: {script_path}
  
  heartbeat_email:
    enabled: False
    hours: 5,12,17,0 # Comma-seperated, 0-23
    to: ""
    cc: ""
    subject: "I'm ALIVE — {timestamp}"
    body: |
      The sequencer is still running.

      Time: {timestamp}

      In Progress:
      {in_progress}