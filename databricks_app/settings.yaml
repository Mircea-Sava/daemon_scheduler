settings:
  emergency: false             #  SET TO true TO RUN EVERYTHING NOW, IN SEQUENCE
  retry_delay_seconds: 660
  use_workers: 1               # 0 = sequential, 1 = parallel (auto-profile via psutil)
# If 0 runs tasks one at a time
# If 1 runs tasks in parallel with auto-profiled worker costs (stored in sequencer_state.json under profiling)
  
  max_workers: 80              # 80% of system (20% reserved for OS overhead)
  default_worker_cost: 1     # Default cost for new/unprofiled scripts (assumes worst case: 100% of system) # avg_cpu computed by removing 0s
  state_file: "sequencer_state.json"
  log_task_output: true            # true = capture and log script, false = discard
  
  git_pull_interval_minutes: 10    # 0 = disabled. Also supports on-demand pull via monitor dashboard.
  git_push_interval_minutes: 480    # 0 = disabled. Commits & pushes state + logs. Also supports on-demand push via monitor dashboard.
  
  ADMIN_TO_ADDRESS: "Laurent.Bonnard@prattwhitney.com,frederic.brissette@prattwhitney.com,MIRCEA.IOAN@prattwhitney.com, hedi.chikhaoui@prattwhitney.com, michel.farah@prattwhitney.com, Sebastian.C.Samaha@prattwhitney.com, younes.charaban@prattwhitney.com"
  ADMIN_CC_ADDRESS: ""
  END_USER_TO_ADDRESS: ""
  END_USER_CC_ADDRESS: ""
#slot: when the script was supposed to run
#last_run: when the script finished running